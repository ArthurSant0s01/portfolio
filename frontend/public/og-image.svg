<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Arthur Santos Portfolio Preview</title>
  <desc id="desc">Official portfolio of Arthur Santos, Creative Developer based in Portugal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1000" cy="80" r="230" fill="#8B5CF6" opacity="0.2" />
  <circle cx="160" cy="560" r="260" fill="#06B6D4" opacity="0.2" />
  <g fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.35">
    <rect x="80" y="80" width="1040" height="470" rx="30" />
  </g>
  <text x="120" y="255" fill="#FFFFFF" font-size="76" font-family="Satoshi, system-ui, sans-serif" font-weight="700">Arthur Santos</text>
  <text x="120" y="335" fill="url(#accent)" font-size="52" font-family="Satoshi, system-ui, sans-serif" font-weight="700">Portfolio</text>
  <text x="120" y="400" fill="#A1A1AA" font-size="32" font-family="Satoshi, system-ui, sans-serif">Creative Developer based in Portugal</text>
</svg>
